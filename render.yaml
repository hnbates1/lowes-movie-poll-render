services:
  - type: web
    name: lowes-movie-poll-244
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: lowes-movie-poll-244-db
          property: connectionString
      - key: LEGACY_RESULTS_URL
        value: https://lowes-movie-poll.hnb16.chatgpt.site/api/results?pollId=STORE0244_MOVIE_POPCORN_2026

databases:
  - name: lowes-movie-poll-244-db
    plan: free
